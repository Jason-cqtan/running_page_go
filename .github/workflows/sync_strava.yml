name: Sync Strava Data

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Sync Strava Data
        run: |
          go run ./cmd/strava_sync \
            --client-id="${{ secrets.STRAVA_CLIENT_ID }}" \
            --client-secret="${{ secrets.STRAVA_CLIENT_SECRET }}" \
            --refresh-token="${{ secrets.STRAVA_REFRESH_TOKEN }}"

      - name: Commit and Push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync strava data [skip ci]"
          file_pattern: "src/static/activities.json"
